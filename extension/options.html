<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenBuilder Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <header>
      <img src="icons/icon48.png" alt="OpenBuilder" width="32" height="32">
      <h1>OpenBuilder Settings</h1>
    </header>

    <!-- AI Provider -->
    <section class="section">
      <h2>AI Provider</h2>
      <p class="description">Choose which AI provider to use for meeting report generation.</p>

      <div class="field">
        <label for="aiProvider">Provider</label>
        <select id="aiProvider">
          <option value="claude">Anthropic Claude</option>
          <option value="openai">OpenAI</option>
        </select>
      </div>

      <div id="claudeSection" class="field">
        <label for="claudeApiKey">Claude API Key</label>
        <div class="input-row">
          <input type="password" id="claudeApiKey" placeholder="sk-ant-api03-...">
          <button id="toggleClaude" class="btn-icon" title="Show/hide">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="hint">Get your key from <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a></span>
      </div>

      <div id="openaiSection" class="field hidden">
        <label for="openaiApiKey">OpenAI API Key</label>
        <div class="input-row">
          <input type="password" id="openaiApiKey" placeholder="sk-...">
          <button id="toggleOpenai" class="btn-icon" title="Show/hide">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="hint">Get your key from <a href="https://platform.openai.com/api-keys" target="_blank">platform.openai.com</a></span>
      </div>
    </section>

    <!-- Behavior -->
    <section class="section">
      <h2>Behavior</h2>

      <div class="field">
        <label class="checkbox-label">
          <input type="checkbox" id="autoCaption" checked>
          Auto-enable captions when meeting starts
        </label>
      </div>

      <div class="field">
        <label class="checkbox-label">
          <input type="checkbox" id="autoRecord">
          Auto-start audio recording when meeting starts
        </label>
      </div>
    </section>

    <!-- Data -->
    <section class="section">
      <h2>Data</h2>
      <p class="description">Manage stored meeting data.</p>

      <div class="field">
        <button id="clearDataBtn" class="btn btn-danger">Clear All Meeting Data</button>
      </div>
    </section>

    <!-- Save -->
    <div class="save-bar">
      <span id="saveStatus" class="save-status"></span>
      <button id="saveBtn" class="btn btn-primary">Save Settings</button>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
